<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Civic Harmony System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
  :root { --bg: #fafafa; --surface: #fff; --text: #111827; --muted: #6b7280; --border: #e5e7eb; --blue: #2563eb; --red: #dc2626; --radius: 12px; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); font-family:'Inter',sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  .login-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:48px; width:400px; box-shadow:0 4px 6px rgba(0,0,0,0.05); }
  .login-card h1 { font-family:'Playfair Display',serif; font-size:28px; margin-bottom:8px; }
  .login-card p { color:var(--muted); font-size:14px; margin-bottom:32px; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:13px; font-weight:500; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
  .field input { width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:8px; font-size:14px; font-family:inherit; }
  .field input:focus { border-color:var(--blue); outline:none; box-shadow:0 0 0 3px rgba(37,99,235,0.1); }
  .btn { width:100%; padding:12px; background:var(--text); color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; margin-top:8px; }
  .btn:hover { opacity:0.9; }
  .error { color:var(--red); font-size:13px; margin-bottom:16px; padding:10px; background:#fef2f2; border:1px solid #fecaca; border-radius:8px; }
</style>
</head>
<body>
<div class="login-card">
  <h1>Command Center</h1>
  <p>National Civic Harmony System — Authorized Access Only</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST" action="/login">
    <div class="field">
      <label>Username</label>
      <input type="text" name="username" autofocus required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit" class="btn">Sign In</button>
  </form>
</div>
</body>
</html>
